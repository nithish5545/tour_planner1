<!DOCTYPE html>
<html>
<head>
    <title>Tour Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Select Your Destination</h1>
<h2>Total: {{ destinations|length }}</h2>

<nav>
    {% for d in destinations %}
    <a href="/calculate/{{ d.id }}">
     <img src="{{ d.image_url }}" style="width:100%; height:300px;">
    </a>
    {% endfor %}
</nav>

</body>
</html>
