{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center;">Welcome {{ name }}</h2>
<h2 style="text-align:center;">🌍 Explore Popular Destinations</h2>

<div class="places">
    {% for d in destinations %}
    <a href="/destination/{{ d.id }}">
        <div class="card">
            <img src="{{ d.image_url }}">
            <h3>{{ d.name }}</h3>
        </div>
    </a>
    {% endfor %}
</div>

<style>
.places{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:40px;
}

.card{
    background:#1e293b;
    width:260px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.5);
    transition:0.4s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}
</style>

{% endblock %}
