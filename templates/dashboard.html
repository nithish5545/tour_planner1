{% extends "base.html" %}

{% block content %}

<div class="hero">
<h1>Welcome {{ name }}</h1>
<p>Explore Popular Destinations</p>
</div>

<div class="destinations">

{% for d in destinations %}

<div class="card">

<img src="{{ d.image_url }}">

<div class="card-body">
<h3>{{ d.name }}</h3>

<a href="/destination/{{ d.id }}">
<button>Explore</button>
</a>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
