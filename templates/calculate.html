<!DOCTYPE html>
<html>
<head>
    <title>Budget Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="calculator-container">
    <h1>{{ destination.name }} - Budget Calculator</h1>

    <form action="/result" method="POST" class="calculator-form">

        <input type="hidden" name="destination_id" value="{{ destination.id }}">

        <label>Number of Days</label>
        <input type="number" name="days" required min="1">

        <label>Number of Persons</label>
        <input type="number" name="persons" required min="1">

        <label>Select Car</label>
        <select name="car_id">
            {% for car in cars %}
            <option value="{{ car.id }}">
                {{ car.car_name }} - ₹{{ car.price_per_day }}/day
            </option>
            {% endfor %}
        </select>

        <button type="submit">Calculate & Book</button>
    </form>

    <a href="/" class="back-btn">← Back to Destinations</a>
</div>

</body>
</html>
